<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life RPG — Tracker Financier</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --panel: #12121a; --border: #2a2a3a;
    --gold: #ffd700; --gold-dim: #a08800; --green: #00ff88;
    --green-dim: #005533; --red: #ff4455; --text: #e0e0f0; --text-dim: #606080;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; min-height: 100vh; padding: 24px 16px; background-image: radial-gradient(ellipse at 20% 20%, rgba(100,60,200,0.07) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(0,180,100,0.05) 0%, transparent 60%); }
  h1 { font-family: 'Press Start 2P', monospace; font-size: 13px; color: var(--gold); text-align: center; letter-spacing: 2px; margin-bottom: 4px; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
  .subtitle { text-align: center; font-size: 11px; color: var(--text-dim); margin-bottom: 28px; letter-spacing: 1px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 14px; max-width: 480px; margin: 0 auto; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .card.gold::before { background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .card.green::before { background: linear-gradient(90deg, transparent, var(--green), transparent); }
  .card-title { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .card-icon { font-size: 16px; }
  .amount-display { font-size: 32px; font-weight: bold; margin-bottom: 4px; letter-spacing: 1px; }
  .card.gold .amount-display { color: var(--gold); }
  .card.green .amount-display { color: var(--green); }
  .amount-label { font-size: 10px; color: var(--text-dim); margin-bottom: 14px; }
  .xp-bar-wrap { background: rgba(255,255,255,0.05); border-radius: 4px; height: 12px; overflow: hidden; margin-bottom: 6px; border: 1px solid var(--border); }
  .xp-bar { height: 100%; border-radius: 4px; transition: width 1s cubic-bezier(.4,0,.2,1); position: relative; overflow: hidden; }
  .xp-bar::after { content: ''; position: absolute; top: 0; left: -100%; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shimmer 2s infinite; }
  @keyframes shimmer { to { left: 200%; } }
  .card.gold .xp-bar { background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
  .card.green .xp-bar { background: linear-gradient(90deg, var(--green-dim), var(--green)); }
  .xp-text { font-size: 10px; color: var(--text-dim); display: flex; justify-content: space-between; margin-bottom: 14px; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  input[type="number"] { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 16px; padding: 10px 12px; width: 100%; margin-top: 10px; outline: none; transition: border-color 0.2s; }
  input[type="number"]:focus { border-color: var(--gold); }
  .btn { font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 12px 8px; border: none; border-radius: 4px; cursor: pointer; letter-spacing: 1px; transition: opacity 0.2s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn.plus { background: var(--green); color: #000; }
  .btn.minus { background: #2a2a3a; color: var(--red); border: 1px solid var(--red); }
  .level-badge { font-family: 'Press Start 2P', monospace; font-size: 9px; background: linear-gradient(135deg, #1a1a2e, #2a1a4e); border: 1px solid #aa66ff; border-radius: 6px; padding: 14px; text-align: center; color: #aa66ff; letter-spacing: 1px; box-shadow: 0 0 20px rgba(170,100,255,0.15); }
  .log-list { list-style: none; max-height: 160px; overflow-y: auto; margin-top: 10px; }
  .log-list li { font-size: 11px; padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; gap: 8px; }
  .log-list li:last-child { border-bottom: none; }
  .log-date { color: var(--text-dim); font-size: 10px; flex-shrink: 0; }
  .log-plus { color: var(--green); }
  .log-minus { color: var(--red); }
  .save-indicator { text-align: center; font-size: 9px; color: var(--text-dim); margin-top: 8px; }
  .save-indicator.saved { color: var(--green); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green); color: #000; font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 12px 20px; border-radius: 6px; transition: transform 0.4s cubic-bezier(.4,0,.2,1); z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<h1>⚔ LIFE RPG</h1>
<p class="subtitle">— TRACKER FINANCIER —</p>
<div class="grid">

  <div class="card gold">
    <div class="card-title"><span class="card-icon">🔒</span> COFFRE-FORT</div>
    <div class="amount-display" id="coffre-amount">0</div>
    <div class="amount-label">pesos — épargne long terme</div>
    <div class="xp-bar-wrap"><div class="xp-bar" id="coffre-bar" style="width:0%"></div></div>
    <div class="xp-text"><span id="coffre-pct">0%</span><span>objectif: 20 000 ₱</span></div>
    <input type="number" id="coffre-input" placeholder="montant...">
    <div class="btn-row">
      <button class="btn plus" onclick="addTo('coffre', 1)">+ DÉPOSER</button>
      <button class="btn minus" onclick="addTo('coffre', -1)">− RETIRER</button>
    </div>
  </div>

  <div class="card green">
    <div class="card-title"><span class="card-icon">🛡️</span> FONDS D'URGENCE</div>
    <div class="amount-display" id="urgence-amount">0</div>
    <div class="amount-label">pesos — bouclier anti-crise</div>
    <div class="xp-bar-wrap"><div class="xp-bar" id="urgence-bar" style="width:0%"></div></div>
    <div class="xp-text"><span id="urgence-pct">0%</span><span>objectif: 8 250 ₱</span></div>
    <input type="number" id="urgence-input" placeholder="montant...">
    <div class="btn-row">
      <button class="btn plus" onclick="addTo('urgence', 1)">+ DÉPOSER</button>
      <button class="btn minus" onclick="addTo('urgence', -1)">− RETIRER</button>
    </div>
  </div>

  <div class="level-badge" id="level-badge">⚔ NV.1 — SURVIVANT</div>

  <div class="card gold">
    <div class="card-title"><span class="card-icon">📜</span> JOURNAL D'AVENTURE</div>
    <ul class="log-list" id="log-list">
      <li><span>⚔ Nouvelle partie démarrée</span><span class="log-plus">0 ₱</span><span class="log-date">Aujourd'hui</span></li>
    </ul>
  </div>

</div>
<div class="save-indicator" id="save-indicator">💾 données sauvegardées</div>
<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'liferpg_data';

  const state = {
    coffre:  { val: 0, goal: 20000, bar: 'coffre-bar',  pct: 'coffre-pct',  amount: 'coffre-amount' },
    urgence: { val: 0, goal: 8250,  bar: 'urgence-bar', pct: 'urgence-pct', amount: 'urgence-amount' },
    log: []
  };

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        coffre: state.coffre.val,
        urgence: state.urgence.val,
        log: state.log
      }));
      const ind = document.getElementById('save-indicator');
      ind.textContent = '💾 sauvegardé ✅';
      ind.classList.add('saved');
      setTimeout(() => { ind.textContent = '💾 données sauvegardées'; ind.classList.remove('saved'); }, 2000);
    } catch(e) {}
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      state.coffre.val = data.coffre || 0;
      state.urgence.val = data.urgence || 0;
      state.log = data.log || [];
      renderLog();
    } catch(e) {}
  }

  function fmt(n) { return Math.round(n).toLocaleString('fr-FR'); }

  function updateUI() {
    for (const key of ['coffre', 'urgence']) {
      const s = state[key];
      const pct = Math.min(100, (s.val / s.goal) * 100);
      document.getElementById(s.bar).style.width = pct + '%';
      document.getElementById(s.pct).textContent = Math.round(pct) + '%';
      document.getElementById(s.amount).textContent = fmt(s.val);
    }
    const badge = document.getElementById('level-badge');
    const u = state.urgence.val;
    if (u >= state.urgence.goal && state.coffre.val >= 5000) {
      badge.textContent = '⚔ NV.3 — EN CROISSANCE 🌱';
      badge.style.color = '#ffd700';
      badge.style.borderColor = '#ffd700';
    } else if (u >= state.urgence.goal) {
      badge.textContent = '🛡️ NV.2 — PROTÉGÉ — BOSS VAINCU ✅';
      badge.style.color = '#00ff88';
      badge.style.borderColor = '#00ff88';
    } else {
      badge.textContent = '⚔ NV.1 — SURVIVANT';
      badge.style.color = '';
      badge.style.borderColor = '';
    }
  }

  function renderLog() {
    const list = document.getElementById('log-list');
    list.innerHTML = '';
    const entries = [...state.log].reverse().slice(0, 20);
    if (entries.length === 0) {
      list.innerHTML = '<li><span>⚔ Nouvelle partie démarrée</span><span class="log-plus">0 ₱</span><span class="log-date">Aujourd\'hui</span></li>';
      return;
    }
    entries.forEach(e => {
      const li = document.createElement('li');
      li.innerHTML = `<span>${e.msg}</span><span class="${e.plus ? 'log-plus' : 'log-minus'}">${e.plus ? '+' : '-'}${fmt(e.amount)} ₱</span><span class="log-date">${e.date}</span>`;
      list.appendChild(li);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function addTo(key, sign) {
    const input = document.getElementById(key + '-input');
    const val = parseFloat(input.value);
    if (!val || val <= 0) { showToast('MONTANT INVALIDE !'); return; }
    const newVal = state[key].val + (sign * val);
    if (newVal < 0) { showToast('SOLDE INSUFFISANT !'); return; }
    state[key].val = newVal;
    input.value = '';
    const labels = { coffre: '🔒 Coffre-fort', urgence: '🛡️ Fonds urgence' };
    const now = new Date();
    const date = now.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
    state.log.push({ msg: labels[key], amount: val, plus: sign > 0, date });
    renderLog();
    updateUI();
    save();
    if (key === 'urgence' && state.urgence.val >= state.urgence.goal) {
      showToast('🏆 BOSS VAINCU ! NV.2 DÉBLOQUÉ !');
    } else {
      showToast((sign > 0 ? '+' : '-') + fmt(val) + ' ₱ SAUVEGARDÉ');
    }
  }

  document.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { addTo(inp.id.replace('-input', ''), 1); }
    });
  });

  load();
  updateUI();
</script>
</body>
</html>
